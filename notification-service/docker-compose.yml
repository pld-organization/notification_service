services:

  postgres:
    image: postgres:16-alpine
    container_name: notification_postgres
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
      POSTGRES_DB: notification_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U notification_user -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_service
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "3002:3002"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata: